services:
  db:
    image: postgres:16-alpine
    container_name: zaframe-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: zaframe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - zaframe_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zaframe"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  zaframe_db_data:
